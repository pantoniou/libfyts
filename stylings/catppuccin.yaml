# Generated by scripts/import-nvim-theme.py from catppuccin/nvim
captures:
  # Capture attributes are matched as POSIX extended regular expressions in order.
  - capture: ^diff\.plus$
    attribute: diff-added
  - capture: ^diff\.minus$
    attribute: diff-removed
  - capture: ^string\.special\.path$
    attribute: path
  - capture: ^string\.special\.key$
    attribute: key
  - capture: ^escape$
    attribute: escape
  - capture: ^embedded$
    attribute: embedded
  - capture: ^attribute$
    attribute: attribute
  - capture: ^label$
    attribute: label
  - capture: ^property$
    attribute: property
  - capture: ^boolean$
    attribute: constant
  - capture: ^comment$
    attribute: comment
  - capture: ^string$
    attribute: string
  - capture: ^number$
    attribute: constant
  - capture: ^constant(\..*)?$
    attribute: constant
  - capture: ^keyword$
    attribute: keyword
  - capture: ^conditional$
    attribute: control
  - capture: ^repeat$
    attribute: control
  - capture: ^function(\..*)?$
    attribute: function
  - capture: ^method$
    attribute: function
  - capture: ^module$
    attribute: type
  - capture: ^type$
    attribute: type
  - capture: ^class$
    attribute: type
  - capture: ^constructor$
    attribute: type
  - capture: ^variable(\..*)?$
    attribute: variable
  - capture: ^parameter$
    attribute: variable
  - capture: ^operator$
    attribute: operator
  - capture: ^delimiter$
    attribute: punctuation
  - capture: ^punctuation(\..*)?$
    attribute: punctuation
  - capture: ^spell$
    attribute: text

