captures:
  # Capture attributes are matched as POSIX extended regular expressions in order.
  - capture: ^none$
    attribute: text
  - capture: ^text\.title$
    attribute: keyword
  - capture: ^text\.literal$
    attribute: string
  - capture: ^text\.uri$
    attribute: path
  - capture: ^text\.reference$
    attribute: label
  - capture: ^text\.danger$
    attribute: diff-removed
  - capture: ^text\.warning$
    attribute: constant
  - capture: ^text\.note$
    attribute: comment
  - capture: ^text$
    attribute: text
  - capture: ^diff\.plus$
    attribute: diff-added
  - capture: ^diff\.minus$
    attribute: diff-removed
  - capture: ^string\.special\.path$
    attribute: path
  - capture: ^string\.special\.key$
    attribute: key
  - capture: ^string\.escape$
    attribute: escape
  - capture: ^string(\..*)?$
    attribute: string
  - capture: ^number(\..*)?$
    attribute: constant
  - capture: ^float$
    attribute: constant
  - capture: ^type(\..*)?$
    attribute: type
  - capture: ^keyword(\..*)?$
    attribute: keyword
  - capture: ^method(\..*)?$
    attribute: function
  - capture: ^field$
    attribute: property
  - capture: ^include$
    attribute: module
  - capture: ^namespace$
    attribute: module
  - capture: ^tag$
    attribute: label
  - capture: ^markup$
    attribute: label
  - capture: ^identifier\.parameter$
    attribute: text
  - capture: ^assignvalue$
    attribute: operator
  - capture: ^_function$
    attribute: function
  - capture: ^_name$
    attribute: text
  - capture: ^_type$
    attribute: type
  - capture: ^escape$
    attribute: escape
  - capture: ^embedded$
    attribute: embedded
  - capture: ^attribute$
    attribute: attribute
  - capture: ^label$
    attribute: label
  - capture: ^property$
    attribute: property
  - capture: ^boolean$
    attribute: constant
  - capture: ^comment$
    attribute: comment
  - capture: ^string$
    attribute: string
  - capture: ^number$
    attribute: constant
  - capture: ^constant(\..*)?$
    attribute: constant
  - capture: ^keyword$
    attribute: keyword
  - capture: ^conditional$
    attribute: control
  - capture: ^repeat$
    attribute: control
  - capture: ^function(\..*)?$
    attribute: function
  - capture: ^method$
    attribute: function
  - capture: ^module$
    attribute: type
  - capture: ^type$
    attribute: type
  - capture: ^class$
    attribute: type
  - capture: ^constructor$
    attribute: type
  - capture: ^variable(\..*)?$
    attribute: variable
  - capture: ^parameter$
    attribute: variable
  - capture: ^operator$
    attribute: operator
  - capture: ^delimiter$
    attribute: punctuation
  - capture: ^punctuation(\..*)?$
    attribute: punctuation
  - capture: ^spell$
    attribute: text

attributes:
  diff-added:
    dark: vscode-number-dark
    light: vscode-number-light
  diff-removed:
    dark: vscode-string-dark
    light: vscode-string-light
  path:
    dark: vscode-function-dark
    light: vscode-function-light
  key:
    dark: vscode-variable-dark
    light: vscode-property-light
  escape:
    dark: vscode-escape-dark
    light: vscode-escape-light
  embedded:
    dark: vscode-text-dark
    light: vscode-text-light
  attribute:
    dark: vscode-variable-dark
    light: vscode-attribute-light
  label:
    dark: vscode-label-dark
    light: vscode-label-light
  property:
    dark: vscode-variable-dark
    light: vscode-property-light
  constant:
    dark: vscode-number-dark
    light: vscode-number-light
  comment:
    dark: vscode-comment-dark
    light: vscode-comment-light
  string:
    dark: vscode-string-dark
    light: vscode-string-light
  keyword:
    dark: vscode-keyword-dark
    light: vscode-keyword-light
  control:
    dark: vscode-control-dark
    light: vscode-control-light
  function:
    dark: vscode-function-dark
    light: vscode-function-light
  type:
    dark: vscode-type-dark
    light: vscode-type-light
  variable:
    dark: vscode-variable-dark
    light: vscode-variable-light
  operator:
    dark: vscode-text-dark
    light: vscode-text-light
  punctuation:
    dark: vscode-text-dark
    light: vscode-text-light
  text:
    dark: vscode-text-dark
    light: vscode-text-light

frame:
  dark-background: frame-dark-background
  light-background: frame-light-background
  dark-conflicts: []
  light-conflicts: []
  dark-contrast: frame-dark-contrast
  light-contrast: frame-light-contrast

